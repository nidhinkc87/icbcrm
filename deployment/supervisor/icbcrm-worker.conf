[program:icbcrm-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /home/icbcrm/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/home/icbcrm/storage/logs/worker.log
stopwaitsecs=3600
